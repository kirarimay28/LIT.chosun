<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>동아리방 사용 신청</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c27;
    --border: #2a2a3d;
    --accent: #7c5cfc;
    --accent2: #c084fc;
    --am: #38bdf8;
    --pm: #fb923c;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --success: #34d399;
    --danger: #f87171;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grain */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .glow-orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(120px);
    pointer-events: none;
    z-index: 0;
  }
  .glow-orb-1 { width: 400px; height: 400px; background: rgba(124,92,252,0.12); top: -100px; left: -100px; }
  .glow-orb-2 { width: 300px; height: 300px; background: rgba(251,146,60,0.08); bottom: -50px; right: -50px; }

  .container {
    position: relative;
    z-index: 1;
    max-width: 780px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 48px;
  }
  .header-badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    padding: 5px 16px;
    border-radius: 100px;
    margin-bottom: 16px;
    text-transform: uppercase;
  }
  .header h1 {
    font-size: clamp(28px, 6vw, 42px);
    font-weight: 900;
    background: linear-gradient(135deg, #fff 30%, var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
    margin-bottom: 10px;
  }
  .header p {
    color: var(--muted);
    font-size: 14px;
    font-family: 'Space Mono', monospace;
  }
  .time-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 13px;
    color: var(--muted);
    margin-top: 12px;
    font-family: 'Space Mono', monospace;
  }
  .time-badge span { color: var(--accent2); font-weight: 700; }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 5px;
    margin-bottom: 32px;
  }
  .tab-btn {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: transparent;
    color: var(--muted);
    font-size: 14px;
    font-weight: 500;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.25s;
  }
  .tab-btn.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-weight: 700;
    box-shadow: 0 4px 20px rgba(124,92,252,0.4);
  }

  /* Panel */
  .panel { display: none; }
  .panel.active { display: block; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Form */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
  }
  .form-section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
    margin-top: 24px;
  }
  .form-section-title:first-child { margin-top: 0; }

  .form-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    color: var(--text);
    font-size: 15px;
    font-family: 'Noto Sans KR', sans-serif;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .form-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,92,252,0.15);
  }
  .form-input::placeholder { color: var(--muted); }

  /* Date + time grid */
  .date-time-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  /* Period selector */
  .period-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 0;
  }
  .period-btn {
    position: relative;
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 18px 16px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
    color: var(--muted);
    font-family: 'Noto Sans KR', sans-serif;
  }
  .period-btn .period-icon { font-size: 24px; display: block; margin-bottom: 6px; }
  .period-btn .period-label { font-size: 16px; font-weight: 700; display: block; }
  .period-btn .period-range { font-size: 11px; font-family: 'Space Mono', monospace; display: block; margin-top: 3px; }
  .period-btn.am.selected {
    border-color: var(--am);
    background: rgba(56,189,248,0.08);
    color: var(--am);
    box-shadow: 0 0 0 3px rgba(56,189,248,0.1);
  }
  .period-btn.pm.selected {
    border-color: var(--pm);
    background: rgba(251,146,60,0.08);
    color: var(--pm);
    box-shadow: 0 0 0 3px rgba(251,146,60,0.1);
  }
  .period-btn:hover:not(.selected) {
    border-color: var(--accent);
    color: var(--text);
  }

  /* Time slots */
  .time-slots {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 8px;
    margin-top: 8px;
  }
  .time-slot {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 8px;
    text-align: center;
    cursor: pointer;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    transition: all 0.18s;
    color: var(--muted);
    user-select: none;
  }
  .time-slot:hover:not(.taken):not(.selected) {
    border-color: var(--accent);
    color: var(--text);
  }
  .time-slot.selected.am-slot {
    border-color: var(--am);
    background: rgba(56,189,248,0.12);
    color: var(--am);
    font-weight: 700;
  }
  .time-slot.selected.pm-slot {
    border-color: var(--pm);
    background: rgba(251,146,60,0.12);
    color: var(--pm);
    font-weight: 700;
  }
  .time-slot.taken {
    opacity: 0.35;
    cursor: not-allowed;
    text-decoration: line-through;
  }
  .time-slot .slot-label { display: block; font-size: 10px; margin-top: 2px; }
  .time-slot.taken .slot-label { color: var(--danger); font-size: 9px; }

  /* Submit */
  .submit-btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    margin-top: 24px;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 24px rgba(124,92,252,0.35);
  }
  .submit-btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 32px rgba(124,92,252,0.5); }
  .submit-btn:active { transform: translateY(0); }
  .submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 24px;
    font-size: 14px;
    font-weight: 500;
    z-index: 1000;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.35s;
    opacity: 0;
    white-space: nowrap;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  .toast.success { border-color: var(--success); color: var(--success); }
  .toast.error { border-color: var(--danger); color: var(--danger); }

  /* List */
  .list-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .list-date-filter {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Space Mono', monospace;
    outline: none;
    cursor: pointer;
  }
  .list-date-filter:focus { border-color: var(--accent); }

  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .filter-chip {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 12px;
    cursor: pointer;
    color: var(--muted);
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.2s;
  }
  .filter-chip.active { border-color: var(--accent); color: var(--accent2); background: rgba(124,92,252,0.1); }

  .entry-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px 22px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 16px;
    transition: border-color 0.2s, transform 0.15s;
    animation: fadeUp 0.3s ease;
  }
  .entry-card:hover { border-color: var(--border); transform: translateX(3px); }
  .entry-card.am-card { border-left: 3px solid var(--am); }
  .entry-card.pm-card { border-left: 3px solid var(--pm); }

  .entry-period-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .entry-period-icon.am { background: rgba(56,189,248,0.12); }
  .entry-period-icon.pm { background: rgba(251,146,60,0.12); }

  .entry-info { flex: 1; min-width: 0; }
  .entry-song {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 4px;
  }
  .entry-meta {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }
  .entry-tag {
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 6px;
    letter-spacing: 1px;
    flex-shrink: 0;
  }
  .entry-tag.am { background: rgba(56,189,248,0.15); color: var(--am); }
  .entry-tag.pm { background: rgba(251,146,60,0.15); color: var(--pm); }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .empty-icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
  .empty-state p { font-size: 15px; }

  .total-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 12px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
  }
  .total-badge span { color: var(--accent2); font-weight: 700; }

  /* Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(6px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }
  .modal-backdrop.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    max-width: 440px;
    width: 100%;
    transform: scale(0.92);
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
  }
  .modal-backdrop.open .modal { transform: scale(1); }
  .modal h3 { font-size: 20px; font-weight: 900; margin-bottom: 8px; }
  .modal p { color: var(--muted); font-size: 14px; line-height: 1.6; margin-bottom: 24px; }
  .modal-highlight {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 24px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--accent2);
    line-height: 1.7;
  }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btn {
    flex: 1;
    padding: 13px;
    border: none;
    border-radius: 11px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    transition: all 0.15s;
  }
  .modal-btn.cancel { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); }
  .modal-btn.cancel:hover { color: var(--text); }
  .modal-btn.confirm { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; box-shadow: 0 4px 16px rgba(124,92,252,0.3); }
  .modal-btn.confirm:hover { opacity: 0.9; }

  .cancel-submit-btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 32px rgba(248,113,113,0.45) !important; }

  /* Reason grid */
  .reason-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .reason-btn {
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: 13px;
    padding: 14px 12px;
    color: var(--muted);
    font-size: 14px;
    font-weight: 600;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .reason-btn:hover:not(.selected) { border-color: var(--accent); color: var(--text); }
  .reason-btn.selected {
    border-color: var(--danger);
    background: rgba(248,113,113,0.1);
    color: var(--danger);
    box-shadow: 0 0 0 3px rgba(248,113,113,0.12);
  }

  /* Cancel reservation cards */
  .cancel-entry-card {
    background: var(--surface2);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 16px 18px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }
  .cancel-entry-card:hover { border-color: var(--danger); }
  .cancel-entry-card.selected {
    border-color: var(--danger);
    background: rgba(248,113,113,0.07);
    box-shadow: 0 0 0 3px rgba(248,113,113,0.1);
  }
  .cancel-radio {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .cancel-entry-card.selected .cancel-radio {
    border-color: var(--danger);
    background: var(--danger);
  }
  .cancel-radio-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #fff;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .cancel-entry-card.selected .cancel-radio-dot { opacity: 1; }
  .cancel-entry-info { flex: 1; min-width: 0; }
  .cancel-entry-song { font-size: 14px; font-weight: 700; margin-bottom: 3px; }
  .cancel-entry-meta { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }

  /* Cancel confirm modal */
  .cancel-confirm .modal-btn.confirm {
    background: linear-gradient(135deg, #f87171, #fb923c);
    box-shadow: 0 4px 16px rgba(248,113,113,0.3);
  }

  @media (max-width: 480px) {
    .reason-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="glow-orb glow-orb-1"></div>
<div class="glow-orb glow-orb-2"></div>

<div class="container">
  <div class="header">
    <div class="header-badge">🎵 LIT</div>
    <h1>동아리방 사용 신청</h1>
    <div class="time-badge">운영시간 <span>09:00 — 22:00</span></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('apply')">✏️ 사용 신청</button>
    <button class="tab-btn" onclick="switchTab('list')">📋 신청 명단</button>
    <button class="tab-btn" onclick="switchTab('cancel')">🗑️ 신청 취소</button>
  </div>

  <!-- Apply Panel -->
  <div id="panel-apply" class="panel active">
    <div class="form-card">
      <div class="form-section-title">🎸 곡 이름</div>
      <input type="text" class="form-input" id="song-name" placeholder="연습할 곡 이름을 입력하세요" />

      <div class="form-section-title">📅 날짜 선택</div>
      <input type="date" class="form-input" id="apply-date" />

      <div class="form-section-title">🌤 시간대 선택</div>
      <div class="period-row">
        <button class="period-btn am" id="btn-am" onclick="selectPeriod('am')">
          <span class="period-icon">🌅</span>
          <span class="period-label">오전</span>
          <span class="period-range">09:00 — 13:00</span>
        </button>
        <button class="period-btn pm" id="btn-pm" onclick="selectPeriod('pm')">
          <span class="period-icon">🌇</span>
          <span class="period-label">오후</span>
          <span class="period-range">13:00 — 22:00</span>
        </button>
      </div>

      <div id="time-slot-section" style="display:none;">
        <div class="form-section-title">⏰ 세부 시간 선택</div>
        <div class="time-slots" id="time-slots-grid"></div>
      </div>

      <button class="submit-btn" id="submit-btn" onclick="openConfirmModal()" disabled>신청하기</button>
    </div>
  </div>

  <!-- List Panel -->
  <div id="panel-list" class="panel">
    <div class="list-header">
      <div class="filter-row" style="margin-bottom:0; gap:8px;">
        <button class="filter-chip active" onclick="setFilter('all',this)">전체</button>
        <button class="filter-chip" onclick="setFilter('am',this)">🌅 오전</button>
        <button class="filter-chip" onclick="setFilter('pm',this)">🌇 오후</button>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <input type="date" class="list-date-filter" id="list-date-filter" onchange="renderList()" />
        <div class="total-badge">총 <span id="total-count">0</span>건</div>
      </div>
    </div>
    <div id="list-container"></div>
  </div>

  <!-- Cancel Panel -->
  <div id="panel-cancel" class="panel">
    <div class="form-card">
      <div class="form-section-title">📅 날짜 선택</div>
      <input type="date" class="form-input" id="cancel-date" onchange="renderCancelList()" />

      <div class="form-section-title">🗂️ 취소할 신청 선택</div>
      <div id="cancel-list-container">
        <div class="empty-state" style="padding:30px 0;">
          <div class="empty-icon" style="font-size:32px;">📅</div>
          <p style="font-size:13px;">날짜를 선택하면 신청 목록이 표시돼요</p>
        </div>
      </div>

      <div id="cancel-reason-section" style="display:none;">
        <div class="form-section-title">❓ 취소 사유</div>
        <div class="reason-grid" id="reason-grid">
          <button class="reason-btn" onclick="selectReason('시간 조정', this)">🔄 시간 조정</button>
          <button class="reason-btn" onclick="selectReason('연습 취소', this)">🚫 연습 취소</button>
          <button class="reason-btn" onclick="selectReason('신청 실수', this)">✏️ 신청 실수</button>
          <button class="reason-btn" onclick="selectReason('기타', this)">💬 기타 (직접 입력)</button>
        </div>
        <div id="reason-custom-wrap" style="display:none; margin-top:12px;">
          <input type="text" class="form-input" id="reason-custom" placeholder="취소 사유를 직접 입력해주세요" oninput="checkCancelSubmit()" />
        </div>
      </div>

      <button class="submit-btn cancel-submit-btn" id="cancel-submit-btn" onclick="openCancelConfirmModal()" disabled style="background: linear-gradient(135deg,#f87171,#fb923c); box-shadow: 0 4px 24px rgba(248,113,113,0.35);">신청 취소하기</button>
    </div>
  </div>
</div>

<!-- Confirm Modal -->
<div class="modal-backdrop" id="confirm-modal">
  <div class="modal">
    <h3>📋 신청 확인</h3>
    <p>아래 내용으로 동아리방 사용을 신청할까요?</p>
    <div class="modal-highlight" id="modal-summary"></div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeModal()">취소</button>
      <button class="modal-btn confirm" onclick="submitReservation()">확인 신청</button>
    </div>
  </div>
</div>

<!-- Cancel Confirm Modal -->
<div class="modal-backdrop cancel-confirm" id="cancel-confirm-modal">
  <div class="modal">
    <h3>🗑️ 취소 확인</h3>
    <p>아래 신청을 정말 취소할까요? 이 작업은 되돌릴 수 없어요.</p>
    <div class="modal-highlight" id="cancel-modal-summary"></div>
    <div class="modal-btns">
      <button class="modal-btn cancel" onclick="closeCancelModal()">돌아가기</button>
      <button class="modal-btn confirm" onclick="executeCancel()">취소 확정</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ---- State ----
let reservations = JSON.parse(localStorage.getItem('club_reservations') || '[]');
let selectedPeriod = null;
let selectedSlot = null;
let currentFilter = 'all';

const AM_SLOTS = [
  { label: '09:00-10:00', start: 9 },
  { label: '10:00-11:00', start: 10 },
  { label: '11:00-12:00', start: 11 },
  { label: '12:00-13:00', start: 12 },
];
const PM_SLOTS = [
  { label: '13:00-14:00', start: 13 },
  { label: '14:00-15:00', start: 14 },
  { label: '15:00-16:00', start: 15 },
  { label: '16:00-17:00', start: 16 },
  { label: '17:00-18:00', start: 17 },
  { label: '18:00-19:00', start: 18 },
  { label: '19:00-20:00', start: 19 },
  { label: '20:00-21:00', start: 20 },
  { label: '21:00-22:00', start: 21 },
];

// ---- Init ----
function init() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('apply-date').value = today;
  document.getElementById('list-date-filter').value = '';
  checkSubmit();
  renderList();
}

// ---- Tabs ----
function switchTab(tab) {
  const tabs = ['apply', 'list', 'cancel'];
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', tabs[i] === tab);
  });
  tabs.forEach(t => {
    document.getElementById(`panel-${t}`).classList.toggle('active', t === tab);
  });
  if (tab === 'list') renderList();
  if (tab === 'cancel') {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('cancel-date').value = today;
    renderCancelList();
  }
}

// ---- Period ----
function selectPeriod(period) {
  selectedPeriod = period;
  selectedSlot = null;
  document.getElementById('btn-am').classList.toggle('selected', period === 'am');
  document.getElementById('btn-pm').classList.toggle('selected', period === 'pm');
  renderTimeSlots();
  document.getElementById('time-slot-section').style.display = 'block';
  checkSubmit();
}

function renderTimeSlots() {
  const date = document.getElementById('apply-date').value;
  const slots = selectedPeriod === 'am' ? AM_SLOTS : PM_SLOTS;
  const takenSlots = reservations
    .filter(r => r.date === date)
    .map(r => r.slotLabel);

  const grid = document.getElementById('time-slots-grid');
  grid.innerHTML = slots.map(s => {
    const taken = takenSlots.includes(s.label);
    const cls = `time-slot ${selectedPeriod}-slot ${taken ? 'taken' : ''}`;
    return `<div class="${cls}" onclick="selectSlot('${s.label}', ${taken})" id="slot-${s.start}">
      ${s.label}
      ${taken ? '<span class="slot-label">사용 중</span>' : ''}
    </div>`;
  }).join('');
}

function selectSlot(label, taken) {
  if (taken) { showToast('⚠️ 이미 신청된 시간대입니다.', 'error'); return; }
  selectedSlot = label;
  document.querySelectorAll('.time-slot').forEach(el => el.classList.remove('selected'));
  const slots = selectedPeriod === 'am' ? AM_SLOTS : PM_SLOTS;
  const s = slots.find(x => x.label === label);
  if (s) document.getElementById(`slot-${s.start}`)?.classList.add('selected');
  checkSubmit();
}

function checkSubmit() {
  const song = document.getElementById('song-name').value.trim();
  const date = document.getElementById('apply-date').value;
  const ok = song && date && selectedPeriod && selectedSlot;
  document.getElementById('submit-btn').disabled = !ok;
}

document.getElementById('song-name').addEventListener('input', checkSubmit);
document.getElementById('apply-date').addEventListener('change', () => {
  selectedSlot = null;
  if (selectedPeriod) renderTimeSlots();
  checkSubmit();
});

// ---- Modal ----
function openConfirmModal() {
  const song = document.getElementById('song-name').value.trim();
  const date = document.getElementById('apply-date').value;
  const period = selectedPeriod === 'am' ? '오전' : '오후';
  document.getElementById('modal-summary').innerHTML =
    `🎵 곡 이름: ${song}\n📅 날짜: ${date}\n${selectedPeriod === 'am' ? '🌅' : '🌇'} 시간대: ${period}\n⏰ 시간: ${selectedSlot}`;
  document.getElementById('confirm-modal').classList.add('open');
}
function closeModal() {
  document.getElementById('confirm-modal').classList.remove('open');
}
document.getElementById('confirm-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ---- Submit ----
function submitReservation() {
  const song = document.getElementById('song-name').value.trim();
  const date = document.getElementById('apply-date').value;

  // Double-check overlap
  const conflict = reservations.find(r => r.date === date && r.slotLabel === selectedSlot);
  if (conflict) { showToast('⚠️ 이미 신청된 시간입니다.', 'error'); closeModal(); return; }

  const entry = {
    id: Date.now(),
    song,
    date,
    period: selectedPeriod,
    slotLabel: selectedSlot,
    createdAt: new Date().toISOString()
  };
  reservations.push(entry);
  localStorage.setItem('club_reservations', JSON.stringify(reservations));

  closeModal();
  showToast(`✅ [<${song}>, ${selectedPeriod === 'am' ? '오전' : '오후'}] 신청 완료!`, 'success');

  // Reset
  document.getElementById('song-name').value = '';
  selectedPeriod = null;
  selectedSlot = null;
  document.getElementById('btn-am').classList.remove('selected');
  document.getElementById('btn-pm').classList.remove('selected');
  document.getElementById('time-slot-section').style.display = 'none';
  checkSubmit();
}

// ---- List ----
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function renderList() {
  const dateFilter = document.getElementById('list-date-filter').value;
  let filtered = reservations;
  if (dateFilter) filtered = filtered.filter(r => r.date === dateFilter);
  if (currentFilter !== 'all') filtered = filtered.filter(r => r.period === currentFilter);
  filtered = [...filtered].sort((a, b) => {
    if (a.date !== b.date) return a.date.localeCompare(b.date);
    return a.slotLabel.localeCompare(b.slotLabel);
  });

  document.getElementById('total-count').textContent = filtered.length;
  const container = document.getElementById('list-container');

  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-state">
      <div class="empty-icon">📭</div>
      <p>${dateFilter ? '해당 날짜에 신청 내역이 없어요.' : '아직 신청 내역이 없어요.'}</p>
    </div>`;
    return;
  }

  container.innerHTML = filtered.map(r => {
    const periodLabel = r.period === 'am' ? '오전' : '오후';
    const icon = r.period === 'am' ? '🌅' : '🌇';
    const formatted = `[&lt;${r.song}&gt;, ${r.slotLabel}]`;
    return `<div class="entry-card ${r.period}-card">
      <div class="entry-period-icon ${r.period}">${icon}</div>
      <div class="entry-info">
        <div class="entry-song">🎵 ${r.song}</div>
        <div class="entry-meta">${r.date} &nbsp;·&nbsp; ${r.slotLabel}</div>
        <div class="entry-meta" style="color:var(--accent2); margin-top:3px; font-size:11px;">${formatted}</div>
      </div>
      <div class="entry-tag ${r.period}">${periodLabel}</div>
    </div>`;
  }).join('');
}

// ---- Cancel ----
let selectedCancelId = null;
let selectedReason = null;

function renderCancelList() {
  const date = document.getElementById('cancel-date').value;
  selectedCancelId = null;
  selectedReason = null;
  document.getElementById('cancel-reason-section').style.display = 'none';
  document.getElementById('cancel-submit-btn').disabled = true;
  document.querySelectorAll('.reason-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('reason-custom-wrap').style.display = 'none';

  const dayRes = reservations.filter(r => r.date === date)
    .sort((a, b) => a.slotLabel.localeCompare(b.slotLabel));

  const container = document.getElementById('cancel-list-container');
  if (!date) {
    container.innerHTML = `<div class="empty-state" style="padding:30px 0;"><div class="empty-icon" style="font-size:32px;">📅</div><p style="font-size:13px;">날짜를 선택하면 신청 목록이 표시돼요</p></div>`;
    return;
  }
  if (dayRes.length === 0) {
    container.innerHTML = `<div class="empty-state" style="padding:30px 0;"><div class="empty-icon" style="font-size:32px;">📭</div><p style="font-size:13px;">해당 날짜에 신청 내역이 없어요</p></div>`;
    return;
  }
  container.innerHTML = dayRes.map(r => {
    const icon = r.period === 'am' ? '🌅' : '🌇';
    const periodLabel = r.period === 'am' ? '오전' : '오후';
    return `<div class="cancel-entry-card" id="ccard-${r.id}" onclick="selectCancelEntry(${r.id})">
      <div class="cancel-radio"><div class="cancel-radio-dot"></div></div>
      <div class="cancel-entry-info">
        <div class="cancel-entry-song">${icon} ${r.song}</div>
        <div class="cancel-entry-meta">${r.date} &nbsp;·&nbsp; ${r.slotLabel} &nbsp;·&nbsp; ${periodLabel}</div>
      </div>
      <div class="entry-tag ${r.period}">${periodLabel}</div>
    </div>`;
  }).join('');
}

function selectCancelEntry(id) {
  selectedCancelId = id;
  selectedReason = null;
  document.querySelectorAll('.cancel-entry-card').forEach(c => c.classList.remove('selected'));
  document.getElementById(`ccard-${id}`)?.classList.add('selected');
  document.getElementById('cancel-reason-section').style.display = 'block';
  document.getElementById('cancel-submit-btn').disabled = true;
  document.querySelectorAll('.reason-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('reason-custom-wrap').style.display = 'none';
  document.getElementById('cancel-reason-section').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function selectReason(reason, el) {
  selectedReason = reason;
  document.querySelectorAll('.reason-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  const customWrap = document.getElementById('reason-custom-wrap');
  if (reason === '기타') {
    customWrap.style.display = 'block';
    document.getElementById('reason-custom').value = '';
    document.getElementById('cancel-submit-btn').disabled = true;
  } else {
    customWrap.style.display = 'none';
    checkCancelSubmit();
  }
}

function checkCancelSubmit() {
  if (!selectedCancelId || !selectedReason) { document.getElementById('cancel-submit-btn').disabled = true; return; }
  if (selectedReason === '기타') {
    const custom = document.getElementById('reason-custom').value.trim();
    document.getElementById('cancel-submit-btn').disabled = !custom;
  } else {
    document.getElementById('cancel-submit-btn').disabled = false;
  }
}

function openCancelConfirmModal() {
  const entry = reservations.find(r => r.id === selectedCancelId);
  if (!entry) return;
  const finalReason = selectedReason === '기타'
    ? document.getElementById('reason-custom').value.trim()
    : selectedReason;
  const periodLabel = entry.period === 'am' ? '오전' : '오후';
  document.getElementById('cancel-modal-summary').innerHTML =
    `🎵 곡 이름: ${entry.song}\n⏰ 시간: ${entry.slotLabel} (${periodLabel})\n❓ 취소 사유: ${finalReason}`;
  document.getElementById('cancel-confirm-modal').classList.add('open');
}
function closeCancelModal() {
  document.getElementById('cancel-confirm-modal').classList.remove('open');
}
document.getElementById('cancel-confirm-modal').addEventListener('click', function(e) {
  if (e.target === this) closeCancelModal();
});

function executeCancel() {
  const entry = reservations.find(r => r.id === selectedCancelId);
  if (!entry) return;
  const finalReason = selectedReason === '기타'
    ? document.getElementById('reason-custom').value.trim()
    : selectedReason;
  const periodLabel = entry.period === 'am' ? '오전' : '오후';

  reservations = reservations.filter(r => r.id !== selectedCancelId);
  localStorage.setItem('club_reservations', JSON.stringify(reservations));

  closeCancelModal();
  showToast(`🗑️ [<${entry.song}>, ${entry.slotLabel}] 취소 완료 (${finalReason})`, 'error');

  // Reset
  selectedCancelId = null;
  selectedReason = null;
  document.getElementById('cancel-reason-section').style.display = 'none';
  document.getElementById('cancel-submit-btn').disabled = true;
  renderCancelList();
}

// ---- Toast ----
function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type}`;
  void t.offsetWidth;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3200);
}

init();
</script>
</body>
</html>
